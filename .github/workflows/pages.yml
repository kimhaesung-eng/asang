name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 전체 워크플로우에 대한 기본 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 여러 배포가 동시에 실행되는 것을 방지
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 🚨 주의: 실제로 'asang-main' 이라는 폴더가 있는지 확인하세요.
          # 만약 레포지토리 최상단의 파일들을 그대로 배포하는 거라면 '.' 으로 적어야 합니다.
          path: './asang-main' 

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # GitHub Pages 배포 시 권장/필수되는 환경 설정
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # v1에서 최신 버전인 v4로 업데이트
